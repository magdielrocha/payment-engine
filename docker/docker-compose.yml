services:
  postgres:
    image: postgres:15-alpine
    container_name: payment_engine_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: payment_engine
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - payment-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: payment-engine-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - payment-network

networks:
  payment-network:
    driver: bridge

